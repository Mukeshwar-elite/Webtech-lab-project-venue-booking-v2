<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Venue - CIT Portal</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="book-venue.css">
    
    <script src="book-venue.js" defer></script>
</head>
<body>
    <header class="navbar" style="background-color:#0A2540">
        <div class="logo-section">
            <img src="cit logo.png" alt="CIT Logo" class="logo-image">
            <h2 style="color: white;">CIT Venue Booking Portal</h2>
        </div>
        <nav>
            <button class="logout-btn" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
        </nav>
    </header>

    <main class="dashboard-container">
        <section class="dashboard-header">
            <h2>Venue Booking Form</h2>
            <p>Please fill out the details below to request a venue.</p>
            <hr class="header-divider">
        </section>

        <div class="booking-form-container">
            <form id="booking-form">
                
                <h3 style="margin-top: 0; color: #0C63E7; border-bottom: 1px solid #eee; padding-bottom: 5px;">Applicant Details</h3>
                
                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="student-name">Full Name *</label>
                        <input type="text" id="student-name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group half-width">
                        <label for="roll-number">Roll Number *</label>
                        <input type="text" id="roll-number" placeholder="e.g., 717824P212" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="department">Department *</label>
                        <select id="department" required>
                            <option value="" disabled selected>-- Select Department --</option>
                            <option value="CSE">Computer Science and Engineering</option>
                            <option value="IT">Information Technology</option>
                            <option value="ECE">Electronics and Communication</option>
                            <option value="EEE">Electrical and Electronics</option>
                            <option value="MECH">Mechanical Engineering</option>
                            <option value="CIVIL">Civil Engineering</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="form-group half-width">
                        <label for="phone-number">Phone Number *</label>
                        <input type="tel" id="phone-number" placeholder="10-digit number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" placeholder="example@cit.edu.in" required>
                </div>

                <h3 style="margin-top: 30px; color: #0C63E7; border-bottom: 1px solid #eee; padding-bottom: 5px;">Event Details</h3>

                <div class="form-group">
                    <label for="venue-select">Select Venue *</label>
                    <select id="venue-select" required>
                        <option value="" disabled selected>-- Choose a venue --</option>
                        <option value="Main Auditorium">Main Auditorium</option>
                        <option value="Conference Room A">Conference Room A</option>
                        <option value="Conference Room B">Conference Room B</option>
                        <option value="Outdoor Space">Outdoor Space</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="event-name">Event Name / Purpose *</label>
                    <input type="text" id="event-name" placeholder="e.g., Technical Symposium" required>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="event-date">Date *</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-group half-width">
                        <label for="attendees">Expected Attendees *</label>
                        <input type="number" id="attendees" min="1" placeholder="e.g., 100" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="start-time">Start Time *</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group half-width">
                        <label for="end-time">End Time *</label>
                        <input type="time" id="end-time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="special-req">Special Requirements (Optional)</label>
                    <textarea id="special-req" rows="3" placeholder="e.g., Need extra projectors, mic, etc..."></textarea>
                </div>

                <button type="submit" class="submit-booking-btn">Confirm Booking</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <small>&copy; 2026 CIT. <a href="#">Contact Support</a></small>
    </footer>
</body>
</html>
