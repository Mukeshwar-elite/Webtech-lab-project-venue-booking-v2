<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CIT Venue Booking</title>
    <link rel="stylesheet" href="style.css">
    <script src="login.js" defer></script>
</head>
<body class="login-body">
    <main class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <img src="cit logo.png" alt="CIT Logo" class="login-logo">
                <h2>CIT Booking Portal</h2>
                <p>Sign in to continue to your dashboard</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter valid password" required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter 10-digit phone number" required>
                </div>
                
                <div class="input-group">
                    <label>Security Check</label>
                    <div id="captcha-display" style="background-color: #eee; padding: 10px; text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 5px; margin-bottom: 8px; border-radius: 4px;">0000</div>
                    <input type="text" id="captcha-input" placeholder="Type the 4 digit code" required> 
                </div> 

                <div class="remember-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div class="login-footer">
                <p>Forgot your password? <a href="#">Click here</a></p>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Coimbatore Institute of Technology. All Rights Reserved.</p>
    </footer>

</body>
</html>
